<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Recursos CSS: Bootstrap, iconos y estilos propios -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;700&display=swap" rel="stylesheet">

    <!-- Mis estilos -->
    <link rel="stylesheet" href="../css/normalize.css">
    <link rel="stylesheet" href="../css/stilos.css">
    <link rel="stylesheet" href="../css/Servi.css">
    <link rel="stylesheet" href="../css/gale.css">
    <link rel="stylesheet" href="../css/contac.css">

    <title>Contactos</title>
</head>
<body>
    <header class="container-fluid">
        <div class="holder container">
            <img src="../imagenes/logo.jpg" alt="logo">
            <h1>Transporte X</h1>
        </div>
    </header>

    <!-- Navegación principal del sitio -->
    <nav>
        <div class="holder">
            <ul class="d-flex justify-content-between">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="./nosotros.html">Nosotros</a></li>
                <li><a href="./servicio.html">Servicios</a></li>
                <li><a href="./galeria.html">Galeria</a></li>
                <li><a href="./novedades.html">Novedades</a></li>
                <li><a class="activo" href="./contactos.html">Contactos</a></li>
            </ul>
        </div>
    </nav>

    <!-- Contenido principal de la página de contacto -->
    <main class="holder contacto">
        <div>
            <h2>Contacto rápido</h2>
            <form action="" method="get" class="formulario">
                <p>
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre">
                </p>
                <p>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email">
                </p>
                <p>
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono">
                </p>
                <p>
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje"></textarea>
                </p>
                <p>
                    <input type="submit" value="Enviar" class="boton">
                </p>
            </form>
        </div>

        <div class="datos">
            <h2>Otras vías de comunicación</h2>
            <p>También puede contactarse con nosotros usando los siguientes medios</p>
            <div class="info">
                <ul>
                    <li>
                        <a class="wh" href="https://wa.me/5491135767337" target="_blank" rel="noopener noreferrer">
                            <i class="bi bi-whatsapp"></i>
                        </a>
                    </li>
                    <li>
                        <a class="em" href="mailto:contacto@Transportesx.com.ar" target="_blank" rel="noopener noreferrer">
                            <i class="bi bi-envelope-at-fill"></i>
                        </a>
                    </li>
                    <li>
                        <a class="lin" href="https://www.linkedin.com/in/ezequiel-ramirez-3a5b8b1b9/" target="_blank" rel="noopener noreferrer">
                            <i class="bi bi-linkedin"></i>
                        </a>
                    </li>
                    <li>
                        <a class="ins" href="https://www.instagram.com/eze____2692____/" target="_blank" rel="noopener noreferrer">
                            <i class="bi bi-instagram"></i>
                        </a>
                    </li>
                    <li>
                        <a class="tw" href="https://twitter.com/TransportesX" target="_blank" rel="noopener noreferrer">
                            <i class="bi bi-twitter"></i>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </main>

    <!-- Pie de página global -->
    <footer>
        <p>Diseñado por Ezequiel Ramirez - &copy; 2023</p>
    </footer>
</body>
</html>
